<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eloann Gaudin — ePortfolio · L1 Psychologie · Rennes 2</title>
<style>
:root{
  --coral:   #F4845F;
  --coral-d: #E8603A;
  --turq:    #5DBEA3;
  --yellow:  #E8C547;
  --peach:   #F2A7BB;
  --violet:  #A78BFA;
  --bg-hero:   #080F0E;
  --bg-pres:   linear-gradient(150deg,#F26B3A 0%,#F5957A 35%,#F2A7BB 65%,#F9D040 100%);
  --bg-parc:   #091628;
  --bg-rx:     linear-gradient(160deg,#1E0640 0%,#071630 100%);
  --bg-comp:   linear-gradient(150deg,#061B12 0%,#122A1C 100%);
  --bg-foot:   #080F0E;
  --cream:  #FFF8F0;
  --t: 280ms ease;
  --r-sm:8px;--r-md:16px;--r-lg:24px;--r-xl:40px;--r-full:9999px;
  --sh: 0 4px 24px rgba(0,0,0,.35);
  --sh-lg: 0 12px 48px rgba(0,0,0,.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
  background:var(--bg-hero);color:var(--cream);
  line-height:1.75;overflow-x:hidden;
}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
ul,ol{list-style:none}
address{font-style:normal}
button{font-family:inherit;cursor:pointer;border:none;background:none}
::selection{background:var(--coral);color:#fff}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg-hero)}
::-webkit-scrollbar-thumb{background:var(--coral);border-radius:3px}
.wrap{max-width:1100px;margin-inline:auto;padding-inline:2.5rem}
section{padding-block:7rem}
.s-over{font-family:monospace;font-size:.72rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;opacity:.55;display:block;margin-bottom:.75rem;}
.s-h2{font-family:'Playfair Display',Georgia,serif;font-size:clamp(2.4rem,4.5vw,3.6rem);font-weight:700;line-height:1.05;letter-spacing:-.025em;margin-bottom:3.5rem;}
#sp{position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,var(--coral),var(--peach));z-index:1001;transition:width .1s linear}
#nav{position:fixed;top:3px;inset-inline:0;z-index:900;display:flex;align-items:center;justify-content:space-between;padding:1.4rem 2.5rem;transition:all var(--t);}
#nav.sc{background:rgba(8,15,14,.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,248,240,.06);padding:.9rem 2.5rem;}
.nav-logo{font-family:'Playfair Display',Georgia,serif;font-size:1.05rem;font-weight:700;color:var(--cream);letter-spacing:.01em;}
.nav-logo em{font-style:normal;color:var(--coral)}
.nav-r{display:flex;align-items:center;gap:.75rem}
#pb{background:var(--coral);color:#fff;padding:.5rem 1.3rem;border-radius:var(--r-full);font-size:.8rem;font-weight:700;letter-spacing:.04em;display:flex;align-items:center;gap:.4rem;box-shadow:0 4px 16px rgba(244,132,95,.35);transition:all var(--t);}
#hero{min-height:100svh;display:flex;align-items:center;background:var(--bg-hero);position:relative;overflow:hidden;padding-top:5rem;}
.hero-blobs{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 65% 65% at 92% 8%, rgba(244,132,95,.22) 0%, transparent 60%), radial-gradient(ellipse 55% 55% at 8% 88%, rgba(93,190,163,.18) 0%, transparent 55%), radial-gradient(ellipse 45% 45% at 55% 55%, rgba(167,139,250,.14) 0%, transparent 50%);}
.hero-name{font-family:'Playfair Display',Georgia,serif;font-size:clamp(3.5rem,7vw,6.5rem);font-weight:900;line-height:.95;letter-spacing:-.03em;color:var(--cream);margin-bottom:1.5rem;}
.hero-name .ln{display:block;background:linear-gradient(90deg,var(--coral),var(--peach));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
/* Final style bits */
</style></head><body>
<div id="sp" role="progressbar" aria-hidden="true"></div>
<nav id="nav" class="sc"><a href="#hero" class="nav-logo">Eloann <em>Gaudin</em></a></nav>
<header id="hero"><div class="wrap"><h1 class="hero-name">Eloann <span class="ln">Gaudin</span></h1><p class="hero-acc">Du design à la psychologie — une trajectoire qui n'a jamais dévié de l'humain.</p></div></header>
<section id="presentation">
<div class="wrap">
<h2 class="s-h2">Une trajectoire <em>cohérente</em></h2>
<p class="pres-lead">Mon parcours semble éclectique — design, restauration, psychologie.</p>
</div>
